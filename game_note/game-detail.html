<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>遊戲詳情 | 遊戲筆記</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <main class="detail-page-shell">
    <div class="detail-topbar">
      <a class="back-link" href="./index.html">返回遊戲庫</a>
      <div class="detail-account">
        <span id="userEmail">讀取登入狀態中</span>
        <button class="button button-secondary" type="button" id="logoutButton">登出</button>
      </div>
    </div>

    <section class="detail-panel detail-page-panel" id="detailPage">
      <header class="detail-header">
        <div class="game-cover-preview" id="coverPreview" aria-hidden="true"></div>
        <div>
          <p class="breadcrumb">遊戲詳情頁</p>
          <h1 id="pageTitle">載入中</h1>
          <p id="pageMeta">讀取遊戲資料中。</p>
        </div>
      </header>

      <form class="game-edit-form detail-page-edit" id="gameEditForm">
        <label>
          遊戲名稱
          <input name="editTitle" required>
        </label>
        <label>
          平台
          <input name="editPlatform" placeholder="例如：手機 / PC / Switch">
        </label>
        <label>
          狀態
          <select name="editStatus">
            <option>遊玩中</option>
            <option>暫停</option>
            <option>已完成</option>
            <option>封存</option>
          </select>
        </label>
        <label>
          更換遊戲圖片
          <span class="custom-file-picker">
            <span class="custom-file-button">選擇檔案</span>
            <span class="custom-file-name" id="editCoverFileName">請選取檔案</span>
            <input name="editCoverFile" type="file" accept="image/*">
          </span>
        </label>
        <div class="edit-form-actions">
          <button class="button button-primary" type="submit">儲存基本資料</button>
        </div>
      </form>

      <div class="detail-layout">
        <section class="workspace-panel">
          <div class="section-heading">
            <h2>筆記條目</h2>
            <span id="noteSummary">0 筆</span>
          </div>
          <form class="inline-form" id="noteForm">
            <div class="note-type-row" aria-label="筆記類型">
              <label>
                <input type="radio" name="noteType" value="text" checked>
                文字
              </label>
              <label>
                <input type="radio" name="noteType" value="image">
                圖片
              </label>
              <label>
                <input type="radio" name="noteType" value="video">
                影片
              </label>
            </div>
            <input name="noteTitle" placeholder="筆記標題" required>
            <textarea name="noteContent" rows="3" placeholder="紀錄攻略、心得、道具位置或劇情線索"></textarea>
            <label class="file-picker note-file-picker" id="noteFilePicker" hidden>
              <span>上傳</span>
              <input name="noteFile" type="file" accept="image/*">
            </label>
            <input name="noteVideoUrl" id="noteVideoUrl" type="url" placeholder="貼上影片連結" hidden>
            <button class="button button-primary" type="submit">新增筆記</button>
          </form>
          <label class="section-search">
            <span class="sr-only">搜尋筆記</span>
            <input id="noteSearchInput" type="search" placeholder="搜尋筆記標題或內容">
          </label>
          <div class="item-list" id="noteList"></div>
        </section>

        <section class="workspace-panel">
          <div class="section-heading">
            <h2>新增遊戲圖片紀念</h2>
            <span id="memorySummary">0 個紀念</span>
          </div>
          <form class="inline-form memory-upload-form" id="memoryForm">
            <div class="note-type-row" aria-label="紀念類型">
              <label>
                <input type="radio" name="memoryType" value="image" checked>
                圖片
              </label>
              <label>
                <input type="radio" name="memoryType" value="video">
                影片
              </label>
              <label>
                <input type="radio" name="memoryType" value="link">
                連結
              </label>
            </div>
            <input name="memoryName" placeholder="紀念名稱（可不填，預設使用檔名）">
            <textarea name="memoryDescription" rows="3" placeholder="介紹文字（可不填）"></textarea>
            <label class="file-picker" id="memoryFilePicker">
              <span>上傳</span>
              <input name="memoryFile" type="file" accept="image/*" required>
            </label>
            <input name="memoryLinkUrl" id="memoryLinkUrl" type="url" placeholder="貼上連結" hidden>
            <button class="button button-primary" type="submit">上傳紀念</button>
          </form>
          <div class="uploaded-memory-section">
            <div class="section-heading compact-heading">
              <h3>已上傳紀念</h3>
              <span>圖片牆</span>
            </div>
            <label class="section-search">
              <span class="sr-only">搜尋紀念</span>
              <input id="memorySearchInput" type="search" placeholder="搜尋紀念名稱或介紹">
            </label>
            <div class="memory-list compact-memory-list" id="memoryList"></div>
          </div>
        </section>
      </div>
    </section>

    <section class="detail-panel detail-page-panel" id="notFoundPanel" hidden>
      <p class="breadcrumb">找不到資料</p>
      <h1>找不到這款遊戲</h1>
      <p class="page-subtitle">可能是網址缺少遊戲 ID，或瀏覽器本機資料已被清除。</p>
      <a class="button button-primary standalone-button" href="./index.html">回到遊戲庫</a>
    </section>
  </main>

  <dialog class="media-preview" id="mediaPreview">
    <button class="media-preview-close" type="button" id="mediaPreviewClose" aria-label="關閉預覽">×</button>
    <div class="media-preview-body" id="mediaPreviewBody"></div>
    <p id="mediaPreviewTitle"></p>
    <p id="mediaPreviewDescription"></p>
  </dialog>

  <dialog class="note-preview" id="notePreview">
    <button class="media-preview-close" type="button" id="notePreviewClose" aria-label="關閉筆記預覽">×</button>
    <article class="note-preview-body">
      <p class="breadcrumb">筆記內容</p>
      <h2 id="notePreviewTitle"></h2>
      <p id="notePreviewContent"></p>
      <div id="notePreviewMedia"></div>
    </article>
  </dialog>

  <dialog class="modal" id="noteEditDialog">
    <form class="modal-panel" id="noteEditForm">
      <header>
        <h2>編輯筆記</h2>
        <button class="icon-button" type="button" id="noteEditCancelButton" aria-label="關閉">×</button>
      </header>
      <input name="editNoteId" type="hidden">
      <label>
        標題
        <input name="editNoteTitle" required>
      </label>
      <label>
        簡介
        <textarea name="editNoteContent" rows="4"></textarea>
      </label>
      <label id="editNoteVideoUrlLabel" hidden>
        影片連結
        <input name="editNoteVideoUrl" type="url" placeholder="貼上影片連結">
      </label>
      <footer>
        <button class="button button-secondary" type="button" id="noteEditCancelFooterButton">取消</button>
        <button class="button button-primary" type="submit">儲存筆記</button>
      </footer>
    </form>
  </dialog>

  <dialog class="modal" id="memoryEditDialog">
    <form class="modal-panel" id="memoryEditForm">
      <header>
        <h2>編輯紀念</h2>
        <button class="icon-button" type="button" id="memoryEditCancelButton" aria-label="關閉">×</button>
      </header>
      <input name="editMemoryId" type="hidden">
      <label>
        名稱
        <input name="editMemoryName" required>
      </label>
      <label>
        介紹文字
        <textarea name="editMemoryDescription" rows="4"></textarea>
      </label>
      <label id="editMemoryLinkUrlLabel" hidden>
        連結
        <input name="editMemoryLinkUrl" type="url" placeholder="貼上連結">
      </label>
      <footer>
        <button class="button button-secondary" type="button" id="memoryEditCancelFooterButton">取消</button>
        <button class="button button-primary" type="submit">儲存紀念</button>
      </footer>
    </form>
  </dialog>

  <script type="module" src="./js/theme.js"></script>
  <script type="module" src="./js/detail.js"></script>
</body>
</html>

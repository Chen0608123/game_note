<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>設定 | 遊戲筆記</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="主要導覽">
      <a class="brand" href="./index.html" aria-label="返回遊戲筆記">
        <span class="brand-mark">N</span>
        <span>
          <strong>遊戲筆記</strong>
          <small>Game Notes Hub</small>
        </span>
      </a>

      <nav class="nav-section" aria-label="主流程">
        <a class="nav-link" href="./index.html">
          <span></span>
          我的遊戲庫
        </a>
        <a class="nav-link is-active" href="./settings.html">
          <span></span>
          設定
        </a>
      </nav>

      <section class="status-card" aria-label="目前設定">
        <strong>目前設定</strong>
        <p>外觀、卡片數量與排序方式會儲存在這台裝置上，之後開啟網站會自動套用。</p>
      </section>
    </aside>

    <main class="content settings-content">
      <header class="page-header settings-header">
        <div>
          <p class="breadcrumb">偏好設定</p>
          <h1>設定</h1>
          <p class="page-subtitle">調整網站顯示方式，讓使用時更符合自己的習慣。</p>
        </div>
      </header>

      <section class="workspace-panel settings-panel">
        <div class="section-heading">
          <h2>網站外觀主題</h2>
          <span id="themeValue">跟隨系統</span>
        </div>

        <div class="setting-row theme-setting-row">
          <div>
            <strong>主題模式</strong>
            <p>可固定淺色或深色，也可以跟著 Windows 的外觀設定自動切換。</p>
          </div>
          <div class="theme-choice-grid" role="radiogroup" aria-label="網站外觀主題">
            <label class="theme-choice">
              <input type="radio" name="themeMode" value="system" checked>
              <span class="theme-choice-preview system-preview"></span>
              <strong>跟隨系統</strong>
            </label>
            <label class="theme-choice">
              <input type="radio" name="themeMode" value="light">
              <span class="theme-choice-preview light-preview"></span>
              <strong>淺色</strong>
            </label>
            <label class="theme-choice">
              <input type="radio" name="themeMode" value="dark">
              <span class="theme-choice-preview dark-preview"></span>
              <strong>深色</strong>
            </label>
          </div>
        </div>

        <div class="setting-actions">
          <button class="button button-secondary" type="button" id="resetThemeButton">恢復跟隨系統</button>
        </div>
      </section>

      <section class="workspace-panel settings-panel">
        <div class="section-heading">
          <h2>卡片顯示方式</h2>
          <span id="cardColumnValue">3 個</span>
        </div>

        <div class="setting-row card-setting-row">
          <div>
            <strong>每排遊戲卡片數量</strong>
            <p>決定首頁遊戲庫一排要顯示幾張遊戲卡片，預設為 3 個。</p>
          </div>
          <div class="segmented-choice-grid" role="radiogroup" aria-label="每排遊戲卡片數量">
            <label class="segmented-choice">
              <input type="radio" name="gameCardColumns" value="2">
              <span>2 個</span>
            </label>
            <label class="segmented-choice">
              <input type="radio" name="gameCardColumns" value="3" checked>
              <span>3 個</span>
            </label>
            <label class="segmented-choice">
              <input type="radio" name="gameCardColumns" value="4">
              <span>4 個</span>
            </label>
          </div>
        </div>

        <div class="setting-actions">
          <button class="button button-secondary" type="button" id="resetCardColumnsButton">恢復預設 3 個</button>
        </div>
      </section>

      <section class="workspace-panel settings-panel">
        <div class="section-heading">
          <h2>遊戲庫排序</h2>
          <span id="sortModeValue">最近更新</span>
        </div>

        <div class="setting-row sort-setting-row">
          <div>
            <strong>排序方式</strong>
            <p>決定我的遊戲庫載入時，遊戲卡片要用哪一種順序顯示。</p>
          </div>
          <div class="segmented-choice-grid sort-choice-grid" role="radiogroup" aria-label="遊戲庫排序方式">
            <label class="segmented-choice">
              <input type="radio" name="gameSortMode" value="recent" checked>
              <span>最近更新</span>
            </label>
            <label class="segmented-choice">
              <input type="radio" name="gameSortMode" value="title">
              <span>標題排序</span>
            </label>
          </div>
        </div>

        <div class="setting-actions">
          <button class="button button-secondary" type="button" id="resetSortModeButton">恢復最近更新</button>
        </div>
      </section>
    </main>

    <aside class="summary" aria-label="帳號資訊">
      <section class="account-panel">
        <h2>帳號</h2>
        <p id="userEmail">讀取登入狀態中</p>
        <button class="button button-secondary" type="button" id="logoutButton">登出</button>
      </section>
    </aside>
  </div>

  <script type="module" src="./js/theme.js"></script>
  <script type="module" src="./js/settings.js"></script>
</body>
</html>
